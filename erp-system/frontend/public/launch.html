  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; overflow-x: hidden; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,

        rgba(255,255,255,0)    40%, rgba(255,255,255,0)    60%,
        rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0)   40%, rgba(255,255,255,0)   60%,
        rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

  <!-- React + Babel (no SRI — avoids hash-mismatch blocking) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

  <script>

    // prefer whichever is truthy; never overwrite a valid reference with undefined.
    window.__FM__ = window.Motion || window.FramerMotion || {};

<body>
  <div id="root"></div>

  <!-- ── FadingVideo ────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef, useEffect } = React;

    const FADE_MS       = 500;
    const FADE_OUT_LEAD = 0.55;

    const FadingVideo = ({ src, className, style = {} }) => {
      const videoRef     = useRef(null);
      const rafRef       = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = (video, target) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const start = performance.now();
        const from  = parseFloat(video.style.opacity) || 0;
        const step  = (now) => {
          const p = Math.min((now - start) / FADE_MS, 1);
          video.style.opacity = String(from + (target - from) * p);
          if (p < 1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.style.opacity = '0';

        const onLoaded = () => {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(video, 1);
        };
        const onTimeUpdate = () => {
          const rem = video.duration - video.currentTime;
          if (!fadingOutRef.current && !isNaN(video.duration) && rem <= FADE_OUT_LEAD && rem > 0) {
            fadingOutRef.current = true;
            fadeTo(video, 0);
          }
        };
        const onEnded = () => {
          video.style.opacity = '0';
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(video, 1);
          }, 100);
        };

        video.addEventListener('loadeddata',  onLoaded);
        video.addEventListener('timeupdate',  onTimeUpdate);
        video.addEventListener('ended',       onEnded);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata',  onLoaded);
          video.removeEventListener('timeupdate',  onTimeUpdate);
          video.removeEventListener('ended',       onEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay muted playsInline preload="auto"
          className={className}
          style={{ opacity: 0, ...style }}
        />
      );
    };
    window.FadingVideo = FadingVideo;
  </script>

  <!-- ── BlurText ───────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef: useRefBT, useEffect: useEffectBT, useState: useStateBT } = React;
    const { motion } = window.__FM__;

    const BlurText = ({ text, className }) => {
      const ref = useRefBT(null);
      const [vis, setVis] = useStateBT(false);
      const words = text.split(' ');

      useEffectBT(() => {
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) setVis(true); },
          { threshold: 0.1 }
        );
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);

      return (
        <p ref={ref} className={className}
          style={{ display:'flex', flexWrap:'wrap', justifyContent:'center', rowGap:'0.1em' }}>
          {words.map((w, i) => (
            <motion.span
              key={i}
              initial={{ filter:'blur(10px)', opacity:0, y:50 }}
              animate={vis
                ? { filter:['blur(10px)','blur(5px)','blur(0px)'], opacity:[0,0.5,1], y:[50,-5,0] }
                : { filter:'blur(10px)', opacity:0, y:50 }}
              transition={{ duration:0.7, times:[0,0.5,1], ease:'easeOut', delay:(i*100)/1000 }}
              style={{ display:'inline-block', marginRight:'0.28em' }}>
              {w}
            </motion.span>
          ))}
        </p>
      );
    };
    window.BlurText = BlurText;
  </script>

  <!-- ── Icons ─────────────────────────────────────────────────── -->

  </script>

  <!-- ── Navbar ────────────────────────────────────────────────── -->

  <!-- ── Hero ──────────────────────────────────────────────────── -->
  <script type="text/babel">

                Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
              </hm.p>

              {/* CTAs */}

              </hm.div>

              {/* Stats */}
              <hm.div {...fu(1.3)} className="flex items-stretch gap-4 mt-8">
                {[
                  {
                    icon:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                    val:'34.5 Min', label:'Average Videos Watch Time'
                  },
                  {
                    icon:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
                    val:'2.8B+', label:'Users Across the Globe'
                  }
                ].map(({ icon, val, label }) => (
                  <div key={label} className="liquid-glass rounded-[1.25rem] p-5 flex flex-col justify-between" style={{ width:'220px' }}>
                    <div>{icon}</div>
                    <div>
                      <p className="font-heading italic text-white text-4xl tracking-[-1px] leading-none mt-4">{val}</p>
                      <p className="text-xs text-white font-body font-light mt-2">{label}</p>
                    </div>
                  </div>
                ))}
              </hm.div>

            {/* Partners */}
            <hm.div {...fu(1.4)} className="flex flex-col items-center gap-4 pb-8">
              <div className="liquid-glass rounded-full px-3.5 py-1">
                <span className="text-xs font-medium text-white font-body">Collaborating with top aerospace pioneers globally</span>
              </div>
              <div className="flex items-center gap-12 md:gap-16">
                {['Aeon','Vela','Apex','Orbit','Zeno'].map(n => (
                  <span key={n} className="font-heading italic text-white text-2xl md:text-3xl tracking-tight">{n}</span>
                ))}
              </div>
            </hm.div>
          </div>
        </section>
      );
    };
    window.HeroSection = HeroSection;
  </script>

          tags:['Natural Context','Photo Realism','Infinite Settings','Eco-Vibe'],

          iconPath:'M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z',
          tags:['Scale Fast','Visual Consistency','Time Saver','Ready to Post'],

          tags:['Ray Tracing','Physical Shadows','Studio Quality','Sunlight Sync'],
        },
      ];

      return (

          <FV

            className="absolute inset-0 w-full h-full object-cover"
            style={{ zIndex:0 }}

          <div style={{ position:'relative', zIndex:10, minHeight:'100vh', display:'flex', flexDirection:'column' }}

                    <p className="mt-3 text-sm font-body font-light leading-snug"
                      style={{ color:'rgba(255,255,255,0.9)', maxWidth:'32ch' }}>{card.body}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };
    window.CapabilitiesSection = CapabilitiesSection;
  </script>

  <!-- ── App ───────────────────────────────────────────────────── -->
  <script type="text/babel">
    const _e = console.error;
    console.error = (...a) => { if (typeof a[0] === 'string' && a[0].includes('key')) return; _e(...a); };

    const HS  = window.HeroSection;
    const CS  = window.CapabilitiesSection;

    const App = () => (
      <React.Fragment>
        <HS/>
        <CS/>
      </React.Fragment>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
