  <!-- ── FadingVideo ─────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef, useEffect } = React;

    const FADE_MS      = 500;
    const FADE_OUT_LEAD = 0.55;

    const FadingVideo = ({ src, className, style = {} }) => {
      const videoRef    = useRef(null);
      const rafRef      = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = (video, target) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const start    = performance.now();
        const from     = parseFloat(video.style.opacity) || 0;

        const step = (now) => {
          const progress = Math.min((now - start) / FADE_MS, 1);
          video.style.opacity = String(from + (target - from) * progress);
          if (progress < 1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.style.opacity = '0';

        const onLoaded = () => {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(video, 1);
        };

        const onTimeUpdate = () => {
          const remaining = video.duration - video.currentTime;
          if (!fadingOutRef.current && !isNaN(video.duration) && remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(video, 0);
          }
        };

        const onEnded = () => {
          video.style.opacity = '0';
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(video, 1);
          }, 100);
        };

        video.addEventListener('loadeddata',  onLoaded);
        video.addEventListener('timeupdate',  onTimeUpdate);
        video.addEventListener('ended',       onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata',  onLoaded);
          video.removeEventListener('timeupdate',  onTimeUpdate);
          video.removeEventListener('ended',       onEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ opacity: 0, ...style }}
        />
      );
    };

    window.FadingVideo = FadingVideo;
  </script>

  <!-- ── BlurText ────────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef: useRefBT, useEffect: useEffectBT, useState: useStateBT } = React;
    const { motion } = Motion;

    const BlurText = ({ text, className }) => {
      const ref     = useRefBT(null);
      const [visible, setVisible] = useStateBT(false);
      const words   = text.split(' ');

      useEffectBT(() => {
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setVisible(true); },
          { threshold: 0.1 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);

      return (
        <p
          ref={ref}
          className={className}
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={visible
                ? { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] }
                : { filter: 'blur(10px)', opacity: 0, y: 50 }}
              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: (i * 100) / 1000 }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    };

    window.BlurText = BlurText;
  </script>

  <!-- ── Icons ──────────────────────────────────────────────────── -->

              </m.div>

              {/* Stats */}

                {[

                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">

                    ),
                    value: '34.5 Min',

                  },
                  {

                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                      </svg>

                    value: '2.8B+',

                ].map(({ icon, value, label }) => (

                      <p className="text-xs text-white font-body font-light mt-2">{label}</p>
                    </div>

              </m.div>

            {/* Partners */}

              <div className="liquid-glass rounded-full px-3.5 py-1">
                <span className="text-xs font-medium text-white font-body">Collaborating with top aerospace pioneers globally</span>
              </div>
              <div className="flex items-center gap-12 md:gap-16">

    };

    window.HeroSection = HeroSection;

          tags: ['Natural Context', 'Photo Realism', 'Infinite Settings', 'Eco-Vibe'],

        {

          body:  'Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.',
          iconPath: 'M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z',
          tags: ['Scale Fast', 'Visual Consistency', 'Time Saver', 'Ready to Post'],
        },
        {
          title: 'Smart Lighting',

          iconPath: 'M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z',
          tags: ['Ray Tracing', 'Physical Shadows', 'Studio Quality', 'Sunlight Sync'],

      return (

                      <svg viewBox="0 0 24 24" style={{ width: '24px', height: '24px', color: 'white' }} fill="currentColor">

                    </div>
                    <div className="flex flex-wrap justify-end gap-1.5" style={{ maxWidth: '70%' }}>
                      {card.tags.map(tag => (
                        <span key={tag} className="liquid-glass rounded-full px-3 py-1 font-body whitespace-nowrap" style={{ fontSize: '11px', color: 'rgba(255,255,255,0.9)' }}>
                          {tag}
                        </span>
                      ))}
                    </div>
                  </div>

                  {/* Spacer */}
                  <div style={{ flex: 1 }} />

                  {/* Bottom: title + body */}
                  <div className="mt-6">
                    <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">{card.title}</h3>
                    <p className="mt-3 text-sm font-body font-light leading-snug" style={{ color: 'rgba(255,255,255,0.9)', maxWidth: '32ch' }}>{card.body}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    window.CapabilitiesSection = CapabilitiesSection;
  </script>

  <!-- ── App ───────────────────────────────────────────────────── -->
  <script type="text/babel">
    // Suppress Framer Motion list-key warnings — benign in multi-script setup
    const _origError = console.error;
    console.error = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('key')) return;
      _origError(...args);
    };

    const App = () => (
      <React.Fragment>
        <window.HeroSection />
        <window.CapabilitiesSection />
      </React.Fragment>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
