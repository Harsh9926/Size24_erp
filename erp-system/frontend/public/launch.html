  <!-- ── FadingVideo ────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef, useEffect } = React;
    const FADE_MS = 500, FADE_OUT_LEAD = 0.55;

    const FadingVideo = ({ src, className, style = {} }) => {
      const vr = useRef(null), rafRef = useRef(null), foRef = useRef(false);

      const fadeTo = (v, t) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const s = performance.now(), f = parseFloat(v.style.opacity) || 0;
        const step = (n) => {
          const p = Math.min((n - s) / FADE_MS, 1);
          v.style.opacity = String(f + (t - f) * p);
          if (p < 1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
      };

      useEffect(() => {
        const v = vr.current; if (!v) return;
        v.style.opacity = '0';
        const onL = () => { v.style.opacity = '0'; v.play().catch(()=>{}); fadeTo(v,1); };
        const onT = () => {
          const r = v.duration - v.currentTime;
          if (!foRef.current && !isNaN(v.duration) && r <= FADE_OUT_LEAD && r > 0) { foRef.current=true; fadeTo(v,0); }
        };
        const onE = () => {
          v.style.opacity='0';
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          setTimeout(() => { v.currentTime=0; v.play().catch(()=>{}); foRef.current=false; fadeTo(v,1); }, 100);
        };
        v.addEventListener('loadeddata', onL);
        v.addEventListener('timeupdate', onT);
        v.addEventListener('ended',      onE);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          v.removeEventListener('loadeddata', onL);
          v.removeEventListener('timeupdate', onT);
          v.removeEventListener('ended',      onE);
        };
      }, [src]);

      return <video ref={vr} src={src} autoPlay muted playsInline preload="auto"
        className={className} style={{ opacity:0, ...style }} />;
    };
    window.FadingVideo = FadingVideo;
  </script>

  <!-- ── BlurText ───────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef: rBT, useEffect: eBT, useState: sBT } = React;
    const { motion } = window.__FM__;

    const BlurText = ({ text, className }) => {
      const ref = rBT(null);
      const [vis, setVis] = sBT(false);
      const words = text.split(' ');
      eBT(() => {
        const o = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVis(true); }, { threshold:0.1 });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, []);
      return (
        <p ref={ref} className={className}
          style={{ display:'flex', flexWrap:'wrap', justifyContent:'center', rowGap:'0.1em' }}>
          {words.map((w,i) => (
            <motion.span key={i}
              initial={{ filter:'blur(10px)', opacity:0, y:50 }}
              animate={vis
                ? { filter:['blur(10px)','blur(5px)','blur(0px)'], opacity:[0,0.5,1], y:[50,-5,0] }
                : { filter:'blur(10px)', opacity:0, y:50 }}
              transition={{ duration:0.7, times:[0,0.5,1], ease:'easeOut', delay:(i*100)/1000 }}
              style={{ display:'inline-block', marginRight:'0.28em' }}>
              {w}
            </motion.span>
          ))}
        </p>
      );
    };
    window.BlurText = BlurText;
  </script>
